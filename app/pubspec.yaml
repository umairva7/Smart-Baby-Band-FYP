name: smart_baby_band
description: Baby Monitor App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  fl_chart: ^0.66.0
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.5
  image_picker: ^1.2.2
  firebase_storage: ^12.4.10
  http: ^1.2.0
  firebase_database: ^11.3.10
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - images/

flutter_icons:
  android: true
  ios: true
  image_path: "images/icon.png"