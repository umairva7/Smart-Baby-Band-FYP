[env:esp32s3box]
platform = espressif32
board = esp32s3box
framework = arduino

; 1. Hardware setup for N16R8
board_build.arduino.memory_type = opi_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; 2. Port configuration (The port Linux finally gave you)
; upload_port = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0
monitor_speed = 115200

; 3. The absolute most important part
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- Library Dependencies ---
lib_deps = 
    knolleary/PubSubClient @ ^2.8
    adafruit/Adafruit BME280 Library @ ^2.2.2
    adafruit/Adafruit Unified Sensor @ ^1.1.9
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    electroniccats/MPU6050 @ ^1.3.0
    kosme/arduinoFFT @ ^2.0
    https://github.com/tanakamasayuki/Arduino_TensorFlowLite_ESP32.git